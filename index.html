<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Summer Card Battle v1.3 Landscape</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="statusLeft">
      <b>Lv.<span id="playerLevel">1</span> 先生</b>
      <small>ST <span id="stamina">100</span>/100</small>
    </div>
    <div class="statusRight">
      <span>💎 <b id="gems">3000</b></span>
      <span>🪙 <b id="coins">10000</b></span>
    </div>
  </header>

  <main>
    <section id="homeScreen" class="screen active">
      <div class="homeHero">
        <div>
          <div class="label">LANDSCAPE BATTLE TEST</div>
          <h1>Summer Card Battle</h1>
          <div class="versionBadge">Version v1.6.1 / Sprite Fix</div>
          <p>スマホ横持ち前提 / プリコネ風左右配置版です。水上由岐をスプライトシートでモーション再生中です。透過・ブレ軽減・撃破後非表示に対応しました。</p>
          <button data-nav="battleScreen">バトルへ</button>
        </div>
      </div>
    </section>

    <section id="battleScreen" class="screen">
      <div class="battleLandscape">
        <div class="battleStageWrap">
          <div class="battleHeaderCompact">
            <div>
              <b>クエスト：戦闘テスト</b>
              <p id="battleStateText">待機中</p>
            </div>
            <div class="headerButtons">
              <button id="startBattleBtn">開始</button>
              <button id="resetBattleBtn">リセット</button>
            </div>
          </div>

          <div id="battleField" class="battleField">
            <div class="fieldTag allyTag">ALLY</div>
            <div class="fieldTag enemyTag">ENEMY</div>
            <div id="damageLayer" class="damageLayer"></div>
          </div>
        </div>

        <aside class="battleSidebar">
          <div class="sidebarPanel">
            <div class="panelCaption">必殺技：TP100でタップ</div>
            <div id="ultimateIcons" class="ultimateIcons"></div>
          </div>

          <div class="sidebarPanel logPanel">
            <div class="panelCaption">バトルログ</div>
            <div class="battleLog" id="battleLog">準備中...</div>
          </div>
        </aside>
      </div>
    </section>

    <section id="cardsScreen" class="screen">
      <div class="sidebarPanel">
        <div class="panelCaption">カード一覧</div>
        <div id="cardList" class="cardList"></div>
      </div>
    </section>
  </main>

  <nav class="bottomNav">
    <button data-nav="homeScreen" class="active">ホーム</button>
    <button data-nav="battleScreen">バトル</button>
    <button data-nav="cardsScreen">カード</button>
  </nav>
</div>

<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
